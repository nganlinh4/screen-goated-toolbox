name: Qwen3 Native CUDA Runtime

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-windows-runtime:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Qwen3 native runtime
        shell: pwsh
        run: ./scripts/build_qwen3_runtime.ps1 -Runtime cu126

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-runtime-windows-x64
          path: dist/qwen3-runtime-windows-x64.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/qwen3-runtime-windows-x64.zip" --clobber
