name: Qwen3 Reference Sidecar

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-windows-sidecar:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Qwen3 reference sidecar
        shell: pwsh
        run: ./scripts/build_qwen3_reference_sidecar.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-asr-reference-windows-x64
          path: dist/qwen3-asr-reference-windows-x64.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/qwen3-asr-reference-windows-x64.zip" --clobber
