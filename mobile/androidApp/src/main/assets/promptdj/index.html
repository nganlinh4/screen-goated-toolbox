<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    @font-face {
      font-family: 'Google Sans Flex';
      font-style: normal;
      font-weight: 100 1000;
      font-stretch: 25% 1000%;
      font-display: swap;
      src: url('../GoogleSansFlex.ttf') format('truetype');
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Google Sans Flex', 'Segoe UI', system-ui, sans-serif !important;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (orientation: landscape) {
      body { overflow: hidden; }
    }
  </style>
  <script>
    // Native media notification bridge — reports playback state to Android
    // so the foreground service + notification stay in sync.
    (function() {
      if (typeof NativeDj === 'undefined') return;
      window.addEventListener('message', function(e) {
        if (!e.data || !e.data.type) return;
        if (e.data.type === 'pm-dj-play') {
          NativeDj.onPlaybackStateChanged('loading');
        } else if (e.data.type === 'pm-dj-pause') {
          NativeDj.onPlaybackStateChanged('paused');
        } else if (e.data.type === 'pm-dj-stop-audio') {
          NativeDj.onPlaybackStateChanged('stopped');
        }
      });
      var lastState = '';
      setInterval(function() {
        var dj = document.querySelector('prompt-dj-midi');
        if (!dj) return;
        var state = dj.playbackState;
        if (state && state !== lastState) {
          lastState = state;
          try { NativeDj.onPlaybackStateChanged(state); } catch(e) {}
        }
      }, 300);
    })();
  </script>
  <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^1.0.0",
          "lit/": "https://esm.sh/lit@^3.3.0/",
          "lit": "https://esm.sh/lit@^3.3.0"
        }
      }
    </script>
  <script type="module" src="assets/index.js"></script>
  <link rel="stylesheet" href="assets/index.css">
</head>

<body>
</body>

</html>
