<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="input.css">
</head>
<body>
    <div class="editor-shell" id="editorShell">
        <div class="header" id="dragRegion">
            <div class="title" id="title"></div>
            <button class="header-button" id="closeButton" type="button">x</button>
        </div>
        <textarea id="editor"></textarea>
        <div class="footer">
            <div class="hint" id="footerHint"></div>
            <button class="submit-button" id="submitButton" type="button"></button>
        </div>
    </div>
    <script src="input.js"></script>
</body>
</html>
