<svg xmlns="http://www.w3.org/2000/svg" width="44" height="43" viewBox="0 0 44 43">
  <defs>
    <!-- Intense, Fast-Paced Animated Gradients -->
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#4facfe;#00f2fe;#f093fb;#00f2fe" dur="1.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4facfe">
        <animate attributeName="stop-color" values="#4facfe;#00f2fe;#f093fb;#f5576c;#4facfe" dur="1.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="gradB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#43e97b">
        <animate attributeName="stop-color" values="#43e97b;#38f9d7;#fbc2eb;#a18cd1;#43e97b" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#38f9d7">
        <animate attributeName="stop-color" values="#38f9d7;#43e97b;#a18cd1;#fbc2eb;#38f9d7" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="gradC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844">
        <animate attributeName="stop-color" values="#ff0844;#ffb199;#c2e9fb;#a1c4fd;#ff0844" dur="1.2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffb199">
        <animate attributeName="stop-color" values="#ffb199;#ff0844;#a1c4fd;#c2e9fb;#ffb199" dur="1.2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D1E29">
        <animate attributeName="stop-color" values="#1D1E29;#2b1055;#102030;#1D1E29" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#101016">
        <animate attributeName="stop-color" values="#101016;#1a0b2e;#08111a;#101016" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Expanding glow filter for the background aura -->
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Safe but dramatic pulsing aura that won't move the cursor hotspot */
    #aura-pulse {
      transform-origin: center;
      transform-box: fill-box;
      animation: throb 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
      mix-blend-mode: screen;
    }

    @keyframes throb {
      0% { transform: scale(0.96); opacity: 0.2; }
      100% { transform: scale(1.08); opacity: 0.85; }
    }
  </style>

  <!-- YOUR EXACT UNTOUCHED NESTED SIZING AND POSITIONING -->
  <svg x="4.24" y="4.66" width="36.52" height="35.69" viewBox="768 341.333333 384 341.333333" preserveAspectRatio="xMidYMid meet" style="overflow:hidden">
    
    <!-- BACKGROUND LAYER: The throbbing hologram aura -->
    <g id="aura-pulse" filter="url(#hyperGlow)">
      <use href="#cursor-core" />
    </g>

