<svg xmlns="http://www.w3.org/2000/svg" width="44" height="43" viewBox="0 0 44 43">
  <style>
    .spinner-container {
      /* Mapped precisely to the right side of the cursor */
      transform-origin: 37.5px 24.2px;
      animation: spin 2s linear infinite;
    }
    
    .spinner-path {
      fill: none;
      stroke: #0A61B2;
      /* Scaled down proportionally for the smaller mini-spinner */
      stroke-width: 2.6; 
      stroke-linecap: round;
      animation: stretch 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    
    /* Circumference for the new smaller radius (4.8) is precisely 30.159 */
    @keyframes stretch {
      0% {
        stroke-dasharray: 0.1, 100;
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dasharray: 21, 100;
        stroke-dashoffset: -7;
      }
      100% {
        stroke-dasharray: 0.1, 100;
        stroke-dashoffset: -30.159;
      }
    }
  </style>
  
  <defs>
    <clipPath id="clip_jepriwin11_07">
      <rect x="0" y="0" width="44" height="43"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#clip_jepriwin11_07)">
    
    <!-- 1. The original mouse pointer (kept exactly as you provided) -->
