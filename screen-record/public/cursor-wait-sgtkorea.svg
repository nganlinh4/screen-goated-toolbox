    <style>
      /* Dramatic brightness pulse that never clips bounds */
      .drum-pulse { animation: pulse-drum 1.5s infinite ease-in-out; }
      @keyframes pulse-drum {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.15); }
      }

      /* Perfect spinning inner taeguk */
      .taeguk-spin {
        transform-origin: center;
        transform-box: fill-box;
        animation: spin-taeguk 2.5s linear infinite;
      }
      @keyframes spin-taeguk {
        100% { transform: rotate(360deg); }
      }

      /* Alternating rim colors for a marquee effect */
      .edge-1 { animation: cycle1 1s step-end infinite; }
      .edge-2 { animation: cycle2 1s step-end infinite; }
      .edge-3 { animation: cycle3 1s step-end infinite; }
      .edge-4 { animation: cycle4 1s step-end infinite; }

      @keyframes cycle1 {
        0%, 24.9% { fill: #c93539; }
        25%, 49.9% { fill: #f3c43b; }
        50%, 74.9% { fill: #63904d; }
        75%, 99.9% { fill: #456cab; }
        100% { fill: #c93539; }
      }
      @keyframes cycle2 {
        0%, 24.9% { fill: #456cab; }
        25%, 49.9% { fill: #c93539; }
        50%, 74.9% { fill: #f3c43b; }
        75%, 99.9% { fill: #63904d; }
        100% { fill: #456cab; }
      }
      @keyframes cycle3 {
