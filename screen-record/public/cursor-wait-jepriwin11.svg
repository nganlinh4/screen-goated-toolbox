<svg xmlns="http://www.w3.org/2000/svg" width="44" height="43" viewBox="0 0 44 43">
  <style>
    .spinner {
      fill: none;
      stroke: #0A61B2;
      stroke-width: 3.8;
      stroke-linecap: round;
      /* Origin set to exactly the center of the 44x43 canvas so it doesn't wobble */
      transform-origin: 22px 21.5px;
      animation: 
        spin 2s linear infinite, 
        stretch 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    
    /* 
      The circumference of a 6.7 radius circle is ~42.1. 
      The dash offsets are scaled exactly to this length to make the tail catch up.
    */
    @keyframes stretch {
      0% {
        stroke-dasharray: 1, 150;
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dasharray: 30, 150;
        stroke-dashoffset: -10;
      }
      100% {
        stroke-dasharray: 1, 150;
        stroke-dashoffset: -42.1;
      }
    }
  </style>
  <circle class="spinner" cx="22" cy="21.5" r="6.7" />
</svg>