<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <defs>
    <!-- Light blue to white gradient (Leading Edge) -->
    <linearGradient id="gradRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFE" />
      <stop offset="100%" stop-color="#CFE5FA" />
    </linearGradient>
    
    <!-- Dark blue to medium blue gradient (Trailing Edge) -->
    <linearGradient id="gradLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6CA4EC" />
      <stop offset="100%" stop-color="#C0DCF7" />
    </linearGradient>
  </defs>

  <!-- Group containing the spinner -->
  <g>
    <!-- Seamless infinite rotation around the mathematical center (22, 22) -->
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 22 22" 
      to="360 22 22" 
      dur="1s" 
      repeatCount="indefinite" 
    />
    
    <!-- Outer background / dark blue center core -->
    <circle cx="22" cy="22" r="9" fill="#344969" />
    
    <!-- Full circle for the left/trailing gradient -->
    <circle cx="22" cy="22" r="7.5" fill="none" stroke="url(#gradLeft)" stroke-width="2" />
    
    <!-- Half circle path for the right/leading gradient (Overlaps perfectly) -->
    <path d="M 22 14.5 A 7.5 7.5 0 0 1 22 29.5" fill="none" stroke="url(#gradRight)" stroke-width="2" />
  </g>
</svg>