name: Release

on:
  release:
    types: [published]

jobs:
  tokenizers:
    runs-on: ubuntu-latest
    name: Generate tokenizers
    steps:
      - name: Install transformers
        run: pip install -q transformers

      - name: Generate 0.6B tokenizer
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          tok = AutoTokenizer.from_pretrained('Qwen/Qwen3-ASR-0.6B', trust_remote_code=True)
          tok.backend_tokenizer.save('tokenizer-0.6B.json')
          print('Saved tokenizer-0.6B.json')
          "

      - name: Generate 1.7B tokenizer
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          tok = AutoTokenizer.from_pretrained('Qwen/Qwen3-ASR-1.7B', trust_remote_code=True)
          tok.backend_tokenizer.save('tokenizer-1.7B.json')
          print('Saved tokenizer-1.7B.json')
          "

      - name: Upload tokenizer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokenizers
          path: |
            tokenizer-0.6B.json
            tokenizer-1.7B.json

  build:
    needs: tokenizers
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            backend: tch
            asset-name: asr-linux-x86_64
            libtorch-url: https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-x86_64-2.7.1.tar.gz
            libtorch-archive: libtorch.tar.gz
          - os: ubuntu-latest
            name: Linux x86_64 (CUDA)
            backend: tch
            asset-name: asr-linux-x86_64-cuda
            libtorch-url: https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-x86_64-cuda12.6-2.7.1.tar.gz
            libtorch-archive: libtorch.tar.gz
            needs-cuda: true
          - os: ubuntu-24.04-arm
            name: Linux ARM64
            backend: tch
            asset-name: asr-linux-aarch64
            libtorch-url: https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-2.7.1.tar.gz
            libtorch-archive: libtorch.tar.gz
          - os: ubuntu-24.04-arm
            name: Linux ARM64 (CUDA/Jetson)
            backend: tch
            asset-name: asr-linux-aarch64-cuda
            libtorch-url: https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-cuda12.6-2.7.1.tar.gz
            libtorch-archive: libtorch.tar.gz
            needs-cuda: true
          - os: macos-latest
            name: macOS ARM64
            backend: mlx
            asset-name: asr-macos-aarch64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        if: matrix.backend == 'tch'

      - uses: actions/checkout@v4
        if: matrix.backend == 'mlx'
        with:
          submodules: recursive

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      - name: Install CUDA toolkit and BLAS (for linking)
        if: matrix.needs-cuda && runner.arch == 'ARM64'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6 libopenblas-dev

      - name: Install CUDA toolkit (x86_64, for linking)
        if: matrix.needs-cuda && runner.arch == 'X64'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clean build state
        run: rm -f Cargo.lock && cargo clean

      - name: Download libtorch
        if: matrix.backend == 'tch'
        run: curl -Lo ${{ matrix.libtorch-archive }} "${{ matrix.libtorch-url }}"

      - name: Extract libtorch
        if: matrix.backend == 'tch'
        run: tar xzf ${{ matrix.libtorch-archive }}

      - name: Set linker flags (Linux only)
        if: matrix.backend == 'tch' && runner.os == 'Linux'
        run: |
          FLAGS="-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib -C link-arg=-Wl,-rpath,\$ORIGIN/libtorch/lib"
          if [ "${{ matrix.needs-cuda }}" = "true" ]; then
            FLAGS="$FLAGS -C link-arg=-Wl,-rpath-link,/usr/local/cuda/lib64"
            echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi
          echo "RUSTFLAGS=$FLAGS" >> "$GITHUB_ENV"

      - name: Build (tch)
        if: matrix.backend == 'tch'
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
        run: cargo build --release

      - name: Build (mlx)
        if: matrix.backend == 'mlx'
        run: cargo build --release --no-default-features --features mlx

      - name: Download tokenizers
        uses: actions/download-artifact@v4
        with:
          name: tokenizers
          path: tokenizers

      - name: Package release
        run: |
          mkdir ${{ matrix.asset-name }}
          cp target/release/asr ${{ matrix.asset-name }}/asr
          cp target/release/asr-server ${{ matrix.asset-name }}/asr-server
          cp -r tokenizers ${{ matrix.asset-name }}/tokenizers
          if [ "${{ matrix.backend }}" = "mlx" ]; then
            cp target/release/build/qwen3_asr-*/out/lib/mlx.metallib ${{ matrix.asset-name }}/
          fi
          if [ "${{ matrix.backend }}" = "tch" ]; then
            cp -r libtorch ${{ matrix.asset-name }}/libtorch
          fi
          zip -r ${{ matrix.asset-name }}.zip ${{ matrix.asset-name }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.asset-name }}.zip"
