<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CC Assistant orb</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100vw; height:100vh; overflow:hidden; background:transparent; pointer-events:none; }
  body { font-family:'Google Sans Flex','Google Sans','Product Sans',system-ui,'Segoe UI',sans-serif;
         color:#eef0f6; -webkit-font-smoothing:antialiased; user-select:none; }
  /*FONT_CSS*/
  #c { position:fixed; inset:0; display:block; touch-action:none; pointer-events:auto; }
  #caption { position:fixed; right:0; bottom:0; text-align:right; pointer-events:none;
             font-size:17px; font-weight:450; line-height:1.32;
             text-shadow:0 2px 18px rgba(0,0,0,.92),0 0 10px rgba(0,0,0,.65); }
  #caption .w { display:inline-block; opacity:0; transform:translateY(10px); filter:blur(6px);
                animation:wordin .5s cubic-bezier(.2,.8,.2,1) forwards; margin-right:.28em; }
  @keyframes wordin { to { opacity:1; transform:none; filter:blur(0); } }
  #glyph { position:fixed; left:0; top:0; z-index:2; color:#07070b; opacity:0;
           pointer-events:none; will-change:transform,opacity; }
  #glyph svg { width:100%; height:100%; display:block; fill:currentColor; }
  /* the typed-command box: click the orb to type a command instead of speaking */
  #cmd { position:fixed; pointer-events:auto; display:none; z-index:4; font-family:inherit;
         font-size:15px; font-weight:450; color:#eef0f6; background:rgba(16,16,26,.82);
         -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
         border:1px solid rgba(255,255,255,.18); border-radius:13px; padding:10px 15px;
         outline:none; caret-color:#9db4ff; box-shadow:0 12px 36px rgba(0,0,0,.55); }
  #cmd::placeholder { color:rgba(238,240,246,.42); }
</style>
</head>

      pS.vx=Math.cos(aE)*sE; pS.vy=Math.sin(aE)*sE; launchOut=false; }
    if(dragging){ pS.x=W*CX_FRAC; pS.y=H*CY_FRAC; pS.vx=0; pS.vy=0; }
    else if(relocating){ pS.x=fcx; pS.y=fcy; pS.vx=0; pS.vy=0; }  // lock to the tweened anchor so the moving region never clips the orb
    else { const goOut=(vis==='out'||vis==='gone'), ptx=goOut?EDGE[0]:fcx, pty=goOut?EDGE[1]:fcy;
      pS.vx += ((ptx-pS.x)*26 - pS.vx*5.8)*dt; pS.vy += ((pty-pS.y)*26 - pS.vy*5.8)*dt;
      pS.x += pS.vx*dt; pS.y += pS.vy*dt; }
    let cx=pS.x, cy=pS.y;
    const sTgt = vis==='in' ? (vp<0.42?0.24:1) : vis==='out' ? (vp<0.13?1.12:0.16) : vis==='gone' ? 0.16 : 1;
    oscS.v += ((sTgt-oscS.x)*220 - oscS.v*15)*dt; oscS.x += oscS.v*dt;
    let vA = vis==='in' ? Math.min(1,vp/0.1) : vis==='out' ? Math.max(0,1-Math.max(0,(vp-0.72)/0.28)) : vis==='gone' ? 0 : 1;
    R*=oscS.x;
    const amp = ampC + audio*0.15; // volume -> stronger edge wobble
    ctx.clearRect(0,0,W,H);
    if(vA<=0.002){ glyphEl.style.opacity='0'; return; }
    const sh1=0.78+0.30*noise1(tNow*0.7+11), sh2=0.80+0.28*noise1(tNow*0.9+33);
    const haloR=R*(0.5+0.12*noise1(tNow*0.33+50))*(1-audio*0.55);   // glow tightens when LOUD so the pulsed body's halo stays inside the orb window box
    const bigBlob=blobPath(cx,cy,R*1.04,flowPhase,amp,rotPhase), blob=blobPath(cx,cy,R,flowPhase,amp,rotPhase);
    const audioGlow=1+audio*0.9; // volume -> halo brightens
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.filter=`blur(${haloR}px)`; ctx.globalAlpha=Math.min(1,0.26*glow*audioGlow)*vA*sh1;
    ctx.fillStyle=gradFrom(cx,cy,R,ang,curPal,true); ctx.fill(bigBlob); ctx.restore();
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.filter=`blur(${R*0.22*(1-audio*0.45)}px)`; ctx.globalAlpha=Math.min(1,0.46*glow*audioGlow)*vA*sh2;
    ctx.fillStyle=gradFrom(cx,cy,R,ang,curPal,true); ctx.fill(bigBlob); ctx.restore();
    const blurAmt=Math.max(0,blurC*(0.65+0.6*noise1(tNow*0.27+40)));
    ctx.save(); ctx.filter=`blur(${R*(0.03+0.16*Math.min(1.2,blurAmt))}px)`; ctx.globalAlpha=vA;
    ctx.fillStyle=gradFrom(cx,cy,R,ang,curPal,false); ctx.fill(blob); ctx.restore();
    // restrict the costly offscreen pass to the orb's bounding box (the canvas spans the whole screen)
    const bx=Math.max(0,(cx-R*2.2)|0), by=Math.max(0,(cy-R*2.2)|0);
    const bw=Math.min(W,Math.ceil(cx+R*2.2))-bx, bh=Math.min(H,Math.ceil(cy+R*2.2))-by;
    octx.setTransform(DPR,0,0,DPR,0,0); octx.clearRect(bx,by,bw,bh); octx.globalCompositeOperation='source-over';
    octx.fillStyle=gradFrom(cx,cy,R,ang,curPal,false); octx.fill(blob);
    octx.globalCompositeOperation='destination-in';
    const eH2=0.30+0.55*noise1(tNow*0.21+2), eH3=0.32+0.55*noise1(tNow*0.17+9), eH5=0.22+0.50*noise1(tNow*0.13+17), eB=0.1+0.5*noise1(tNow*0.10+25);
    const p2=tNow*0.13, p3=1.7-tNow*0.19, p5=0.6+tNow*0.11;
    const cg=octx.createConicGradient(tNow*0.1,cx,cy);
    for(let s=0;s<=24;s++){ const u=s/24, t2=u*TAU;
      const soft=blurAmt*(eB + eH2*Math.sin(t2*2+p2) + eH3*Math.sin(t2*3+p3) + eH5*Math.sin(t2*5+p5));
      cg.addColorStop(u,`rgba(0,0,0,${clamp(1-soft,0,1).toFixed(3)})`); }
    octx.fillStyle=cg; octx.fillRect(bx,by,bw,bh); octx.globalCompositeOperation='source-over';
    if(bw>0&&bh>0){ ctx.save(); ctx.globalAlpha=vA; ctx.drawImage(oc, bx*DPR,by*DPR,bw*DPR,bh*DPR, bx,by,bw,bh); ctx.restore(); }
    if(vis==='live' && curIcon){ const ic=easeOut(surface);
      if(glyphEl.dataset.icon!==curIcon){ glyphEl.dataset.icon=curIcon; const b=ICONS[curIcon];
        glyphEl.innerHTML = b ? '<svg viewBox="0 -960 960 960">'+b+'</svg>' : ''; }
      const sz=R*1.35; glyphEl.style.width=sz+'px'; glyphEl.style.height=sz+'px'; glyphEl.style.left=cx+'px'; glyphEl.style.top=cy+'px';
      const swing=(Math.sin(tNow*2.3)*5 + Math.sin(tNow*1.13+0.7)*2.2)*swingC; // sway, gated to long "processing" states via swingC
      glyphEl.style.transform=`translate(-50%,-50%) rotate(${swing.toFixed(2)}deg) scale(${lerp(0.84,1,ic)})`; glyphEl.style.opacity=String(0.93*ic*vA);
    } else { glyphEl.style.opacity='0'; }
  }
  function easeOut(t){return 1-Math.pow(1-t,3);}
  function frame(now){ const dt=Math.min(.05,(now-last)/1000); last=now; step(dt); requestAnimationFrame(frame); }

  // ---- Rust bridge (wry IPC) ----
  function postIPC(obj){ try{ if(window.ipc&&window.ipc.postMessage) window.ipc.postMessage(JSON.stringify(obj)); }catch(_){} }
  // caption sits just above the orb, right edge near the orb's right, growing leftward (inside the region).
  function positionCaption(){ if(!W) return; const ox=W*CX_FRAC, oy=H*CY_FRAC, Rn=Math.min(W,H)*0.16*mag;
    capEl.style.right=Math.max(8,W-(ox+Rn*1.5))+'px'; capEl.style.bottom=Math.max(8,H-(oy-Rn*1.7))+'px';
    capEl.style.maxWidth=Math.min(ox-24,420)+'px'; }
  // The window region (SetWindowRgn) is the ONLY visible AND clickable area — it clips pixels too — so it
  // must be generous enough that the orb's soft glow fully fades inside it, or you'd see a hard square edge.
  function reportRegion(){ if(!W) return; positionCaption();
    // While flying in/out, drop to the FULL window (orbDrag) so the orb appears from the real SCREEN
    // edge, not the clipped box edge. It snaps back to the tight box when it settles (vis==='live').
    if(vis==='in'||vis==='out'){ postIPC({type:'orbDrag'}); return; }
    const ox=W*CX_FRAC, oy=H*CY_FRAC, Rn=Math.min(W,H)*0.16*mag, RR=Rn*2.4;  // region must COVER the full glow (SetWindowRgn clips visual too)
    let x1=ox-RR, y1=oy-RR, x2=ox+RR, y2=oy+RR;
    const cr=capEl.getBoundingClientRect();
    if(captionText && cr.width>2){ x1=Math.min(x1,cr.left-12); y1=Math.min(y1,cr.top-10); x2=Math.max(x2,cr.right+12); y2=Math.max(y2,cr.bottom+10); }
    if(cmdOpen){ const br=cmdEl.getBoundingClientRect(); if(br.width>2){ x1=Math.min(x1,br.left-12); y1=Math.min(y1,br.top-12); x2=Math.max(x2,br.right+12); y2=Math.max(y2,br.bottom+12); } }
    x1=Math.max(0,x1); y1=Math.max(0,y1); x2=Math.min(W,x2); y2=Math.min(H,y2);
    postIPC({type:'orbRegion', x:x1, y:y1, w:x2-x1, h:y2-y1}); }

  // ---- typed command box: click (tap, no drag) the orb to type a command instead of speaking ----
  function positionCmd(){ if(!W) return; const ox=W*CX_FRAC, oy=H*CY_FRAC, Rn=Math.min(W,H)*0.16*mag;
    cmdEl.style.width=clamp(W*0.2,190,300)+'px';
    cmdEl.style.right=Math.max(10,W-(ox+Rn*1.6))+'px';            // right edge near the orb's right
    cmdEl.style.bottom=Math.max(10,H-(oy-Rn*2.0))+'px'; }         // sit just above the orb
  function openCmd(){ if(cmdOpen||vis!=='live') return; cmdOpen=true; positionCmd();
    cmdEl.value=''; cmdEl.style.display='block'; reportRegion(); postIPC({type:'openCommand'});
    setTimeout(()=>{ try{cmdEl.focus();}catch(_){} },0); }        // focus after Rust takes window focus
  function hideBox(){ if(!cmdOpen) return; cmdOpen=false; cmdEl.style.display='none';
    try{cmdEl.blur();}catch(_){} reportRegion(); }                // visual only — Rust restores focus
  function dismissCmd(){ hideBox(); postIPC({type:'closeCommand'}); }   // user-initiated (Esc / Enter)
  function submitCmd(){ const t=(cmdEl.value||'').trim(); if(t) postIPC({type:'command',text:t}); dismissCmd(); }
  cmdEl.addEventListener('keydown', e=>{ e.stopPropagation();
    if(e.key==='Enter'){ e.preventDefault(); submitCmd(); }
    else if(e.key==='Escape'){ e.preventDefault(); dismissCmd(); } });

  // ---- drag (the user repositions the orb; Rust persists it) ----
  let downX=0, downY=0, moved=false;
  cv.addEventListener('pointerdown', e=>{
    const ox=W*CX_FRAC, oy=H*CY_FRAC, RR=Math.min(W,H)*0.16*mag*1.3;  // small grab radius — right on the orb
    if(Math.hypot(e.clientX-ox, e.clientY-oy) <= RR){
      dragging=true; moved=false; downX=e.clientX; downY=e.clientY;
      dragDX=e.clientX-ox; dragDY=e.clientY-oy; try{cv.setPointerCapture(e.pointerId);}catch(_){} }
  });
  cv.addEventListener('pointermove', e=>{
    if(!dragging){ const ox=W*CX_FRAC, oy=H*CY_FRAC, RR=Math.min(W,H)*0.16*mag*1.3;
      cv.style.cursor = (Math.hypot(e.clientX-ox, e.clientY-oy) <= RR) ? 'grab' : 'default'; return; }
    if(!moved && Math.hypot(e.clientX-downX, e.clientY-downY) > 6){   // crossed the threshold → a real drag
      moved=true; cv.style.cursor='grabbing'; postIPC({type:'orbDrag'}); }
    if(moved){ CX_FRAC=clamp((e.clientX-dragDX)/W, 0.06, 0.94); CY_FRAC=clamp((e.clientY-dragDY)/H, 0.08, 0.92); } });
  cv.addEventListener('pointerup', e=>{ if(!dragging) return; dragging=false; cv.style.cursor='grab';
    try{cv.releasePointerCapture(e.pointerId);}catch(_){}
    if(moved){ postIPC({type:'orbMoved', cxFrac:CX_FRAC, cyFrac:CY_FRAC}); reportRegion(); }
    else { cmdOpen ? dismissCmd() : openCmd(); } });   // a tap (no drag) toggles the command box

  // ---- public API driven by Rust evaluate_script ----
  let settleTimer=null;
  window.cc = {
    setState(label){ const i=LABELS[label]; if(i==null) return; enter(i);
      if(settleTimer){ clearTimeout(settleTimer); settleTimer=null; }
      // done/error ease back on their own. 'responding' does NOT auto-clear: the reply AUDIO plays
      // for many seconds after its transcript finishes, so the caption must persist until Rust signals
      // real speech-end (set_model_idle) — otherwise the text vanishes mid-sentence.
      if(label==='done'||label==='error'){
        settleTimer=setTimeout(()=>{ enter(LABELS['idle']); captionText=''; renderCaption(); }, 2600); } },
    setCaption(text){ captionText=stripMd(text); renderCaption(); },
    setAudio(level){ audioExt=clamp(+level||0,0,1); audioExtActive=true; },
    setIcon(name){ iconOverride=(name&&ICONS[name])?name:null; }, // live glyph override (e.g. sentiment); auto-cleared on next setState
    show(){ if(vis==='gone'||vis==='out'){ vis='in'; vp=0; flowBurst=5; reseed=true; } reportRegion(); },
    hide(){ if(cmdOpen) dismissCmd(); if(vis==='in'||vis==='live'){ vis='out'; vp=0; flowBurst=4; launchOut=true; } captionText=""; renderCaption(); },
    configurePlacement(cfg){ cfg=cfg||{}; if(cfg.mag!=null)mag=cfg.mag;
      if(cfg.cxFrac!=null)CX_FRAC=clamp(cfg.cxFrac,0.04,0.96); if(cfg.cyFrac!=null)CY_FRAC=clamp(cfg.cyFrac,0.06,0.94);
      CX_TARGET=CX_FRAC; CY_TARGET=CY_FRAC; relocating=false; reportRegion(); },
    // Glide to a new corner (Rust dodges the orb away from where the agent is about to act, or sends
    // it back home). The spring-bypassed tween (see step) keeps the region locked to the orb en route.
    moveTo(cx,cy){ if(dragging||vis!=='live') return; relocFromX=CX_FRAC; relocFromY=CY_FRAC;
      CX_TARGET=clamp(cx,0.04,0.96); CY_TARGET=clamp(cy,0.06,0.94); relocT=0; relocating=true; },
    closeCmd(){ hideBox(); },   // Rust calls this to hide the box when the cursor leaves the orb
  };

  resize(); enter(0); requestAnimationFrame(frame);
  // Tell Rust the page has parsed + initialised, so it reveals the window only once we can paint our
  // transparent canvas — otherwise the very FIRST show flashes the WebView's white default background.
  postIPC({type:'orbReady'});
})();
</script>
</body>
</html>
